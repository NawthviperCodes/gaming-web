<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ game.name }} - GameZone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="play-page" data-game="{{ game_slug }}">
    <header class="play-header">
        <a href="/games" class="back-link">← Library</a>
        <div>
            <strong>{{ game.name }}</strong>
            <span id="play-state">Ready</span>
        </div>
        <div class="score-pill">Score <strong id="score">0</strong></div>
    </header>

    <main class="play-main">
        <section class="game-shell">
            <div class="game-instructions">
                <h1>{{ game.icon }} {{ game.name }}</h1>
                <p>{{ game.description }}</p>
            </div>

            <div id="game-stage" class="game-stage" aria-live="polite">
                <canvas id="snake-canvas" width="360" height="360" hidden></canvas>
                <button id="reaction-target" class="reaction-target" type="button" aria-label="Tap target" hidden></button>
                <div id="memory-board" class="memory-board" hidden></div>
                <div id="start-panel" class="start-panel">
                    <button id="start-game" class="btn start">Start game</button>
                </div>
            </div>

            <div id="touch-controls" class="touch-controls" aria-label="Game controls" hidden>
                <button data-direction="up" aria-label="Move up">▲</button>
                <div>
                    <button data-direction="left" aria-label="Move left">◀</button>
                    <button data-direction="down" aria-label="Move down">▼</button>
                    <button data-direction="right" aria-label="Move right">▶</button>
                </div>
            </div>

            <div class="play-actions">
                <span>Time: <strong id="timer">0s</strong></span>
                <button id="finish-game" type="button" class="btn login">Finish & save</button>
            </div>
            <p id="game-message" class="game-message"></p>
        </section>
    </main>

    <script src="{{ url_for('static', filename='games.js') }}"></script>
</body>
</html>
